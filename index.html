<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameContainer {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #0a0a1a;
            border: 2px solid #2a2a4a;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.2);
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        // ============================================================
        // ALIEN SHOOTER — Complete Game
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800;
        const H = 600;

        // --- Starfield Background ---
        class Starfield {
            constructor(count) {
                this.stars = [];
                for (let i = 0; i < count; i++) {
                    this.stars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        size: Math.random() * 2 + 0.5,
                        brightness: Math.random() * 0.5 + 0.5
                    });
                }
            }

            draw() {
                for (const star of this.stars) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        const starfield = new Starfield(150);

        // --- Bullet Class ---
        class Bullet {
            constructor(x, y, vy, isPlayer) {
                this.x = x;
                this.y = y;
                this.vy = vy;
                this.width = 4;
                this.height = 10;
                this.isPlayer = isPlayer;
                this.active = true;
            }

            update() {
                this.y += this.vy;
                if (this.y < -this.height || this.y > H + this.height) {
                    this.active = false;
                }
            }

            draw() {
                if (!this.active) return;
                ctx.fillStyle = this.isPlayer ? '#00ff88' : '#ff4444';
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                
                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.isPlayer ? '#00ff88' : '#ff4444';
                ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        // --- Particle Class ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = 2 + Math.random() * 4;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            get active() {
                return this.life > 0;
            }
        }

        // --- Alien Class ---
        class Alien {
            constructor(x, y, row) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 20;
                this.row = row;
                this.active = true;
                
                // Colors vary by row
                const colors = ['#ff6b6b', '#ffa94d', '#ffd43b', '#69db7c', '#74c0fc'];
                this.color = colors[row % colors.length];
                this.eyeColor = '#ffffff';
            }

            draw() {
                if (!this.active) return;
                
                ctx.save();
                
                // Body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = this.eyeColor;
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2 - 6, this.y + this.height / 2 - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2 + 6, this.y + this.height / 2 - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Pupils
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2 - 6, this.y + this.height / 2 - 3, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2 + 6, this.y + this.height / 2 - 3, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Antennae
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2 - 5, this.y + 2);
                ctx.lineTo(this.x + this.width / 2 - 8, this.y - 5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2 + 5, this.y + 2);
                ctx.lineTo(this.x + this.width / 2 + 8, this.y - 5);
                ctx.stroke();
                
                // Antenna tips
                ctx.fillStyle = '#ffd43b';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2 - 8, this.y - 5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2 + 8, this.y - 5, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // --- Player Class ---
        class Player {
            constructor() {
                this.width = 40;
                this.height = 30;
                this.x = W / 2 - this.width / 2;
                this.y = H - this.height - 20;
                this.speed = 5;
                this.dx = 0;
                this.shootCooldown = 0;
                this.shootDelay = 15; // frames between shots
            }

            update() {
                this.x += this.dx;

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > W) this.x = W - this.width;
                
                if (this.shootCooldown > 0) this.shootCooldown--;
            }

            draw() {
                ctx.save();

                // Thruster flame
                const flicker = Math.random() * 5;
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2 - 8, this.y + this.height);
                ctx.lineTo(this.x + this.width / 2, this.y + this.height + 12 + flicker);
                ctx.lineTo(this.x + this.width / 2 + 8, this.y + this.height);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2 - 4, this.y + this.height);
                ctx.lineTo(this.x + this.width / 2, this.y + this.height + 7 + flicker * 0.5);
                ctx.lineTo(this.x + this.width / 2 + 4, this.y + this.height);
                ctx.closePath();
                ctx.fill();

                // Main body
                ctx.fillStyle = '#4a9eff';
                ctx.fillRect(this.x + 5, this.y + 10, this.width - 10, this.height - 10);

                // Cockpit
                ctx.fillStyle = '#88ddff';
                ctx.fillRect(this.x + 12, this.y + 12, this.width - 24, 6);

                // Nose cone
                ctx.fillStyle = '#3a8eef';
                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + 5, this.y + 12);
                ctx.lineTo(this.x + this.width - 5, this.y + 12);
                ctx.closePath();
                ctx.fill();

                // Wings
                ctx.fillStyle = '#2a7edf';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 15);
                ctx.lineTo(this.x - 5, this.y + this.height);
                ctx.lineTo(this.x + 5, this.y + this.height);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(this.x + this.width, this.y + 15);
                ctx.lineTo(this.x + this.width + 5, this.y + this.height);
                ctx.lineTo(this.x + this.width - 5, this.y + this.height);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            canShoot() {
                return this.shootCooldown === 0;
            }

            shoot() {
                if (!this.canShoot()) return null;
                this.shootCooldown = this.shootDelay;
                return new Bullet(this.x + this.width / 2, this.y, -7, true);
            }

            getBounds() {
                return {
                    x: this.x,
                    y: this.y,
                    width: this.width,
                    height: this.height
                };
            }
        }

        // --- Game State ---
        const GameState = {
            MENU: 'menu',
            PLAYING: 'playing',
            GAMEOVER: 'gameover',
            WIN: 'win'
        };

        // --- Game Class ---
        class Game {
            constructor() {
                this.state = GameState.MENU;
                this.player = new Player();
                this.aliens = [];
                this.playerBullets = [];
                this.alienBullets = [];
                this.particles = [];
                this.score = 0;
                this.alienSpeed = 1;
                this.alienDirection = 1;
                this.alienDropAmount = 10;
                this.alienShootTimer = 0;
                this.alienShootInterval = 60; // frames
                this.screenShake = 0;
                this.baseAlienSpeed = 1;
                this.initialAlienCount = 0;
                
                this.initAliens();
            }

            initAliens() {
                this.aliens = [];
                const rows = 5;
                const cols = 8;
                const spacingX = 50;
                const spacingY = 40;
                const startX = (W - (cols - 1) * spacingX) / 2 - 15;
                const startY = 50;

                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        const x = startX + col * spacingX;
                        const y = startY + row * spacingY;
                        this.aliens.push(new Alien(x, y, row));
                    }
                }
                this.initialAlienCount = this.aliens.length;
            }

            reset() {
                this.player = new Player();
                this.playerBullets = [];
                this.alienBullets = [];
                this.particles = [];
                this.score = 0;
                this.alienSpeed = 1;
                this.alienDirection = 1;
                this.alienShootTimer = 0;
                this.screenShake = 0;
                this.baseAlienSpeed = 1;
                this.initAliens();
            }

            start() {
                this.reset();
                this.state = GameState.PLAYING;
            }

            update() {
                if (this.state !== GameState.PLAYING) return;

                // Update player
                this.player.update();

                // Update player bullets
                for (const bullet of this.playerBullets) {
                    bullet.update();
                }
                this.playerBullets = this.playerBullets.filter(b => b.active);

                // Update alien bullets
                for (const bullet of this.alienBullets) {
                    bullet.update();
                }
                this.alienBullets = this.alienBullets.filter(b => b.active);

                // Update aliens
                this.updateAliens();

                // Alien shooting
                this.alienShootTimer++;
                if (this.alienShootTimer >= this.alienShootInterval) {
                    this.alienShootTimer = 0;
                    this.alienShoot();
                }

                // Collision detection
                this.checkCollisions();

                // Update particles
                for (const particle of this.particles) {
                    particle.update();
                }
                this.particles = this.particles.filter(p => p.active);

                // Screen shake decay
                if (this.screenShake > 0) this.screenShake *= 0.9;
                if (this.screenShake < 0.1) this.screenShake = 0;

                // Check win condition
                const activeAliens = this.aliens.filter(a => a.active);
                if (activeAliens.length === 0) {
                    this.state = GameState.WIN;
                }

                // Difficulty scaling
                const remaining = activeAliens.length;
                this.alienSpeed = this.baseAlienSpeed + (this.initialAlienCount - remaining) * 0.1;
            }

            updateAliens() {
                let hitEdge = false;
                
                for (const alien of this.aliens) {
                    if (!alien.active) continue;
                    alien.x += this.alienSpeed * this.alienDirection;
                    
                    if (alien.x + alien.width > W || alien.x < 0) {
                        hitEdge = true;
                    }
                }

                if (hitEdge) {
                    this.alienDirection *= -1;
                    for (const alien of this.aliens) {
                        if (!alien.active) continue;
                        alien.y += this.alienDropAmount;
                        
                        // Check if alien reached bottom
                        if (alien.y + alien.height > this.player.y) {
                            this.state = GameState.GAMEOVER;
                        }
                    }
                }
            }

            alienShoot() {
                const activeAliens = this.aliens.filter(a => a.active);
                if (activeAliens.length === 0) return;
                
                const shooter = activeAliens[Math.floor(Math.random() * activeAliens.length)];
                const bullet = new Bullet(
                    shooter.x + shooter.width / 2,
                    shooter.y + shooter.height,
                    4,
                    false
                );
                this.alienBullets.push(bullet);
            }

            checkCollisions() {
                // Player bullets vs aliens
                for (const bullet of this.playerBullets) {
                    if (!bullet.active) continue;
                    
                    for (const alien of this.aliens) {
                        if (!alien.active) continue;
                        
                        if (this.rectCollision(bullet, alien.getBounds())) {
                            bullet.active = false;
                            alien.active = false;
                            this.score += 10;
                            
                            // Particle effect
                            this.spawnExplosion(
                                alien.x + alien.width / 2,
                                alien.y + alien.height / 2,
                                alien.color
                            );
                            break;
                        }
                    }
                }

                // Alien bullets vs player
                for (const bullet of this.alienBullets) {
                    if (!bullet.active) continue;
                    
                    if (this.rectCollision(bullet, this.player.getBounds())) {
                        bullet.active = false;
                        this.state = GameState.GAMEOVER;
                        this.screenShake = 10;
                        this.spawnExplosion(
                            this.player.x + this.player.width / 2,
                            this.player.y + this.player.height / 2,
                            '#ff4444'
                        );
                        break;
                    }
                }
            }

            rectCollision(a, b) {
                const ax = a.x - a.width / 2;
                const ay = a.y - a.height / 2;
                const aw = a.width;
                const ah = a.height;
                
                return ax < b.x + b.width &&
                       ax + aw > b.x &&
                       ay < b.y + b.height &&
                       ay + ah > b.y;
            }

            spawnExplosion(x, y, color) {
                const colors = [color, '#ffd43b', '#ff922b', '#ffffff'];
                for (let i = 0; i < 12; i++) {
                    this.particles.push(new Particle(
                        x,
                        y,
                        colors[Math.floor(Math.random() * colors.length)]
                    ));
                }
            }

            draw() {
                ctx.save();

                // Screen shake
                if (this.screenShake > 0) {
                    const shakeX = (Math.random() - 0.5) * this.screenShake;
                    const shakeY = (Math.random() - 0.5) * this.screenShake;
                    ctx.translate(shakeX, shakeY);
                }

                // Clear
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(-10, -10, W + 20, H + 20);

                // Starfield
                starfield.draw();

                if (this.state === GameState.MENU) {
                    this.drawMenu();
                } else if (this.state === GameState.PLAYING) {
                    this.drawGame();
                } else if (this.state === GameState.GAMEOVER) {
                    this.drawGame();
                    this.drawGameOver();
                } else if (this.state === GameState.WIN) {
                    this.drawGame();
                    this.drawWin();
                }

                ctx.restore();
            }

            drawMenu() {
                // Title
                ctx.fillStyle = '#4a9eff';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('ALIEN SHOOTER', W / 2, H / 2 - 60);
                
                // Subtitle
                ctx.fillStyle = '#88ddff';
                ctx.font = '20px "Courier New", monospace';
                ctx.fillText('Defend Earth from the Alien Invasion!', W / 2, H / 2 - 10);
                
                // Instructions
                ctx.fillStyle = '#aaa';
                ctx.font = '16px "Courier New", monospace';
                ctx.fillText('Arrow Keys / A,D - Move', W / 2, H / 2 + 40);
                ctx.fillText('Space / Click - Shoot', W / 2, H / 2 + 65);
                
                // Start prompt
                const pulse = Math.sin(Date.now() / 500) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                ctx.font = 'bold 24px "Courier New", monospace';
                ctx.fillText('Press SPACE to Start', W / 2, H / 2 + 130);
            }

            drawGame() {
                // Draw aliens
                for (const alien of this.aliens) {
                    alien.draw();
                }

                // Draw player
                this.player.draw();

                // Draw bullets
                for (const bullet of this.playerBullets) {
                    bullet.draw();
                }
                for (const bullet of this.alienBullets) {
                    bullet.draw();
                }

                // Draw particles
                for (const particle of this.particles) {
                    particle.draw();
                }

                // Draw score
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.textAlign = 'left';
                ctx.fillText(`Score: ${this.score}`, 20, 35);
                
                // Draw alien count
                const active = this.aliens.filter(a => a.active).length;
                ctx.fillStyle = '#aaa';
                ctx.font = '14px "Courier New", monospace';
                ctx.fillText(`Aliens: ${active}`, 20, 60);
            }

            drawGameOver() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, W, H);
                
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText(`Final Score: ${this.score}`, W / 2, H / 2 + 20);
                
                const pulse = Math.sin(Date.now() / 500) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                ctx.font = '20px "Courier New", monospace';
                ctx.fillText('Press SPACE to Restart', W / 2, H / 2 + 70);
            }

            drawWin() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, W, H);
                
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('YOU WIN!', W / 2, H / 2 - 30);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText(`Final Score: ${this.score}`, W / 2, H / 2 + 20);
                
                const pulse = Math.sin(Date.now() / 500) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
                ctx.font = '20px "Courier New", monospace';
                ctx.fillText('Press SPACE to Play Again', W / 2, H / 2 + 70);
            }

            playerShoot() {
                if (this.state !== GameState.PLAYING) return;
                const bullet = this.player.shoot();
                if (bullet) {
                    this.playerBullets.push(bullet);
                }
            }

            handleKeyDown(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (this.state === GameState.MENU) {
                        this.start();
                    } else if (this.state === GameState.GAMEOVER || this.state === GameState.WIN) {
                        this.start();
                    } else if (this.state === GameState.PLAYING) {
                        this.playerShoot();
                    }
                }
                
                if (this.state === GameState.PLAYING) {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                        this.player.dx = -this.player.speed;
                        e.preventDefault();
                    }
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                        this.player.dx = this.player.speed;
                        e.preventDefault();
                    }
                }
            }

            handleKeyUp(e) {
                if (this.state === GameState.PLAYING) {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                        if (this.player.dx < 0) this.player.dx = 0;
                        e.preventDefault();
                    }
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                        if (this.player.dx > 0) this.player.dx = 0;
                        e.preventDefault();
                    }
                }
            }

            handleClick(e) {
                if (this.state === GameState.MENU) {
                    this.start();
                } else if (this.state === GameState.GAMEOVER || this.state === GameState.WIN) {
                    this.start();
                } else if (this.state === GameState.PLAYING) {
                    this.playerShoot();
                }
            }
        }

        // --- Initialize Game ---
        const game = new Game();

        // --- Input Handling ---
        document.addEventListener('keydown', (e) => game.handleKeyDown(e));
        document.addEventListener('keyup', (e) => game.handleKeyUp(e));
        canvas.addEventListener('click', (e) => game.handleClick(e));

        // --- Game Loop ---
        function gameLoop() {
            game.update();
            game.draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
